prompt = "Kerjakan patrol solutioning Patricia untuk `sprint_5/sprint_5.3` dengan aturan ketat satu fitur per cycle, satu thread yang sama, dan jangan mengulang item yang statusnya sudah final di memory automation.\n\nSource of truth utama untuk memilih kerja adalah `sprint_5/sprint_5.3/MILESTONE.md`. Di awal setiap cycle, baca `MILESTONE.md` dan `memory.md` automation ini terlebih dahulu.\n\nGunakan aturan pemilihan item berikut secara urut:\n1. Lewati semua item pada bagian `Solutioning yang sudah sesuai`.\n2. Lewati semua item pada bagian `Solutioning yang masih butuh konfirmasi`.\n3. Abaikan seluruh `Catatan Khusus` sebagai input non-actionable.\n4. Kerjakan item pada bagian `Solutioning yang belum sama sekali` yang belum berstatus final di memory.\n5. Jika tidak ada lagi, kerjakan item pada bagian `Solutioning yang masih belom sesuai` yang belum berstatus final di memory.\n6. Jangan memilih item yang sudah ada di daftar final `done`, `adjusted`, `blocked`, atau `skipped` di memory.\n\nDefinisi status item:\n- `done`: item dari `belum sama sekali` sudah memiliki file solutioning target yang dibuat dan isinya sudah cukup untuk milestone.\n- `adjusted`: item dari `belom sesuai` sudah diperbaiki dan format akhirnya sudah mengikuti template referensi.\n- `blocked`: item memang membutuhkan baseline atau existing yang diwajibkan milestone, tetapi baseline itu belum tersedia di repo atau source sprint saat ini.\n- `skipped`: item memang harus dilewati karena butuh konfirmasi user, figma/source belum siap, atau milestone secara eksplisit menyuruh skip.\n\nAturan pengerjaan untuk item terpilih:\n1. Tentukan apakah item termasuk `belum sama sekali` atau `belom sesuai`.\n2. Jika item `belum sama sekali`, buat solutioning baru hanya jika milestone tidak menahannya dan source minimum tersedia.\n3. Jika item `belom sesuai`, jangan rewrite liar dari nol. Gunakan baseline existing yang relevan lalu sesuaikan file target agar format, urutan section, gaya penjelasan, dan tingkat kerapihannya mengikuti `sprint_5/sprint_5.3/solutioning/apk-version-5.3.md`.\n4. Jangan gunakan format wajib milik `solutioning-analyst` sebagai patokan akhir. Template output yang benar adalah file `apk-version-5.3.md`.\n5. Sebelum cycle dianggap selesai, review file target terhadap template `apk-version-5.3.md` dan pastikan hasilnya tidak berantakan seperti `device-5.3.md` versi yang salah format.\n6. Simpan hasil akhir hanya untuk satu fitur pada cycle itu. Jangan pindah ke fitur lain dalam cycle yang sama.\n\nAturan blocked vs greenfield:\n- Jika milestone atau catatan fitur menunjukkan harus memakai existing tertentu tetapi existing itu belum tersedia, tandai `blocked` dan jangan memaksakan solutioning baru.\n- Jika fitur memang scope baru dan milestone tidak melarang, boleh buat solutioning baru dari source yang tersedia.\n- Jangan menganggap semua fitur tanpa baseline sebagai blocked. Putuskan berdasarkan milestone dan source yang benar-benar ada.\n\nAturan thread dan pelaporan:\n- Lanjutkan selalu di thread yang sama yang terikat pada automation ini. Jangan sengaja membuat thread baru.\n- Thread adalah histori utama. Setelah cycle selesai, kirim ringkasan singkat ke thread yang menyebut fitur, status (`done`, `adjusted`, `blocked`, atau `skipped`), alasan singkat bila tidak selesai normal, dan sisa item actionable menurut milestone.\n- Setelah ringkasan thread terkirim, kirim notifikasi Telegram singkat melalui skill local `telegram-bot-sender` dengan alias bot `yuikens_bot`. Telegram adalah notifikasi sekunder, bukan histori utama.\n- Semua output thread, review, dan Telegram wajib menggunakan Bahasa Indonesia saja.\n\nAturan memory automation:\n- Update `memory.md` setiap selesai cycle.\n- Simpan daftar final `done`, `adjusted`, `blocked`, dan `skipped` beserta alasan singkat bila relevan.\n- Simpan `last_processed` dengan nama fitur dan hasil cycle terakhir.\n- Jika suatu item belum final, jangan masukkan ke daftar final. Catat hanya sebagai konteks agar cycle berikutnya masih boleh memperbaikinya.\n\nStop condition global:\n- Jika semua item actionable dari milestone sudah masuk ke status final `done`, `adjusted`, `blocked`, atau `skipped`, kirim pesan final ke thread lalu kirim notifikasi final ke Telegram bahwa seluruh solutioning actionable sprint 5.3 sudah selesai.\n- Setelah pesan final terkirim, anggap automation selesai total dan jangan menjalankan cycle solutioning baru lagi.\n- Jangan melakukan review ulang pada item yang sudah final hanya untuk mengulang pekerjaan lama."
